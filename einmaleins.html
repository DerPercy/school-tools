<!-- Beispielseite für das Einmaleins im Hunderterraum mit Mengenvisualisierung -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Einmaleins im Hunderterraum</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    .grid { display: grid; grid-template-columns: repeat(10, 30px); gap: 4px; margin-bottom: 20px; }
    .cell { width: 30px; height: 30px; background: #eee; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; }
    .highlight1 { background: #4caf50; color: white; }
    .highlight2 { background: #2196f3; color: white; }
    .highlight3 { background: #ff9800; color: white; }
    .highlight4 { background: #e91e63; color: white; }
    .highlight5 { background: #9c27b0; color: white; }
    .highlight6 { background: #00bcd4; color: white; }
    .highlight7 { background: #8bc34a; color: white; }
    .highlight8 { background: #ffc107; color: white; }
    .highlight9 { background: #f44336; color: white; }
    .highlight10 { background: #607d8b; color: white; }
    .controls { margin-bottom: 20px; }
    label { margin-right: 10px; }
  </style>
</head>
<body>
  <h1>Das Einmaleins im Hunderterraum</h1>
  <p>Wähle zwei Zahlen und sieh dir an, wie viele Felder das Ergebnis ergibt!</p>
  <div class="controls">
    <label for="factor1">Zahl 1:</label>
    <select id="factor1">
      <!-- Zahlen von 1 bis 10 -->
      <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
      <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
    </select>
    <label for="factor2">Zahl 2:</label>
    <select id="factor2">
      <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
      <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
    </select>
    <button onclick="updateGrid()">Zeigen!</button>
  </div>
  <div id="result"></div>
  <div class="grid" id="grid"></div>
  <script>
    function updateGrid() {
      const f1 = parseInt(document.getElementById('factor1').value);
      const f2 = parseInt(document.getElementById('factor2').value);
      const product = f1 * f2;
      document.getElementById('result').innerHTML = `<strong>${f1} × ${f2} = ${product}</strong>`;
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      // Jede Menge (entspricht einem Faktor) bekommt eine eigene Farbe
      for (let i = 0; i < 100; i++) {
        const cell = document.createElement('div');
        let cls = 'cell';
        if (i < product) {
          // Farbwechsel nach jedem f2er Block, jetzt 10 Farben
          const colorIdx = Math.floor(i / f2) % 10 + 1;
          cls += ` highlight${colorIdx}`;
        }
        cell.className = cls;
        cell.textContent = '';
        grid.appendChild(cell);
      }
    }
    // Initialanzeige
    updateGrid();
  </script>
</body>
</html>
